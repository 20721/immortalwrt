name: ImmortalWrt X86-64 云端编译

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: '编译目标平台'
        required: true
        default: 'x86_64'
      build_version:
        description: 'ImmortalWrt版本'
        required: true
        default: 'master'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: 检查系统时间
      run: |
        sudo timedatectl set-timezone "Asia/Shanghai"
        date

    - name: 检出源码
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.build_version }}
        fetch-depth: 1

    - name: 安装编译依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch python3 python3-pip unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx-ucl autoconf automake libtool autopoint device-tree-compiler g++-multilib antlr3 gperf wget curl rsync

    - name: 执行自定义脚本(添加插件)
      run: |
        chmod +x diy.sh
        ./diy.sh

    - name: 更新Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 生成配置文件
      run: |
        cp config.seed .config
        make defconfig

    - name: 下载编译依赖
      run: |
        make download -j$(nproc) V=s

    - name: 开始编译固件
      run: |
        make -j$(nproc) V=s || make -j1 V=s

    - name: 上传编译产物
      uses: actions/upload-artifact@v4
      with:
        name: immortalwrt-x86-64-firmware
        path: bin/targets/x86/64/
